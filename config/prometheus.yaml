system:
  name: "Prometheus"
  version: "0.1.0"

model:
  provider: "llama_cpp"
  base_url: "http://GPU_HOST:8080"
  model: "gemma4-26b"
  fallback_provider: "ollama"
  fallback_url: "http://GPU_HOST:11434"

context:
  effective_limit: 24000
  compression_trigger: 0.75
  tool_result_max: 4000
  reserved_output: 2000
  fresh_tail_count: 32
  model_overrides:
    "qwen3.5-32b": { effective_limit: 24000 }
    "gemma4-26b-moe": { effective_limit: 32000 }
    "gemma4-31b": { effective_limit: 48000 }

security:
  permission_mode: "default"
  workspace_root: "~"
  denied_commands:
    - "rm -rf /"
    - "rm -rf ~"
    - "DROP TABLE"
    - "mkfs"
  denied_paths:
    - "/etc"
    - "/sys"
    - "/boot"
    - "~/.ssh"

  # Sprint 11: Permission audit logging
  audit:
    enabled: true
    retention_days: 30

  # Sprint 11: Secret exfiltration detection
  exfiltration:
    enabled: true

infrastructure:
  mini_host: "MINI_HOST"
  mini_port: 8005
  gpu_host: "GPU_HOST"
  archive_enabled: true
  telemetry_enabled: true

gateway:
  telegram_enabled: true
  telegram_token: ""                # Set via PROMETHEUS_TELEGRAM_TOKEN env var
  allowed_chat_ids: []              # empty = allow all; set to restrict
  proxy_url: null                   # optional SOCKS5/HTTP proxy for Telegram
  system_prompt: "You are Prometheus, a sovereign AI agent. You have access to tools for file operations, shell commands, and cron job management. Be concise and helpful."
  heartbeat_interval: 30            # seconds between health checks
  cron_enabled: true                # run cron scheduler alongside gateway

# Model Router Configuration (Sprint 10)
model_router:
  enabled: true
  rules:
    # Route code tasks to primary Qwen (best at structured output)
    - task_type: "code_generation"
      provider: "llama_cpp"
      model: "qwen3.5-32b"
      min_confidence: 0.5

    # Route quick answers to faster Gemma
    - task_type: "quick_answer"
      provider: "ollama"
      model: "gemma4-26b"
      min_confidence: 0.6

    # Route reasoning to Qwen (best at complex tasks)
    - task_type: "reasoning"
      provider: "llama_cpp"
      model: "qwen3.5-32b"

    # Route creative to Qwen
    - task_type: "creative"
      provider: "llama_cpp"
      model: "qwen3.5-32b"

    # Route tool-heavy to Qwen (best tool calling)
    - task_type: "tool_heavy"
      provider: "llama_cpp"
      model: "qwen3.5-32b"

  fallback_chain:
    - provider: "llama_cpp"
      base_url: "http://GPU_HOST:8080"
      model: "qwen3.5-32b"
    - provider: "ollama"
      base_url: "http://GPU_HOST:11434"
      model: "gemma4-26b"
    - provider: "anthropic"
      model: "claude-3-haiku"

# Divergence Detection Configuration (Sprint 10)
divergence:
  enabled: true
  checkpoint_interval: 5       # Create checkpoint every N tool calls
  threshold: 0.7               # Score that triggers rollback consideration
  auto_rollback_trust_level: 3 # Only AUTONOMOUS (3) gets auto-rollback
  max_rollbacks: 2             # Prevent infinite loops
  use_llm_eval: false          # Enable LLM-based divergence eval (costs tokens)
  llm_eval_budget: 500         # Max tokens for LLM eval if enabled

learning:
  periodic_nudge_interval: 15  # turns
  auto_skill_creation: true
  memory_md_max_chars: 2200
  user_md_max_chars: 1375

sentinel:
  enabled: true
  idle_threshold_minutes: 15        # how long before "idle" triggers
  nudge_cooldown_minutes: 60        # min time between proactive Telegram nudges
  dream_interval_minutes: 30        # time between dream cycles during idle
  dream_budget_tokens: 2000         # max LLM tokens per dream cycle
  stale_threshold_days: 90          # when facts start losing confidence
  confidence_decay_rate: 0.05       # per-cycle decay for stale facts
  digest_lookback_hours: 24         # telemetry digest window
  auto_fix_wiki: true               # let wiki linter auto-fix safe issues
  synthesis_enabled: true           # enable LLM-powered knowledge synthesis
